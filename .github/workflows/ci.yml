name: CI

on:
  pull_request:
  workflow_dispatch:
    inputs:
      build_type:
        description: Build type
        required: true
        default: Release
        type: choice
        options:
          - Release
          - RelWithDebInfo
      run_tests:
        description: Run unit tests
        required: true
        default: false
        type: boolean
      sanitizer:
        description: Sanitizer profile
        required: true
        default: off
        type: choice
        options:
          - off
          - asan
      platform_set:
        description: Platform scope
        required: true
        default: full
        type: choice
        options:
          - full
          - windows
          - linux
          - macos

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-matrix:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows MSVC
            os: windows-latest
            platform_scope: windows
            qt_host: windows
            qt_arch: win64_msvc2022_64
            build_config: Release
          - name: Linux GCC
            os: ubuntu-latest
            platform_scope: linux
            qt_host: linux
            qt_arch: gcc_64
            generator: Ninja
            build_config: Release
            c_compiler: gcc
            cxx_compiler: g++
          - name: Linux Clang
            os: ubuntu-latest
            platform_scope: linux
            qt_host: linux
            qt_arch: gcc_64
            generator: Ninja
            build_config: Release
            c_compiler: clang
            cxx_compiler: clang++
          - name: macOS AppleClang
            os: macos-latest
            platform_scope: macos
            qt_host: mac
            qt_arch: clang_64
            generator: Ninja
            build_config: Release
            c_compiler: clang
            cxx_compiler: clang++

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve CI options
        id: ci_options
        shell: pwsh
        run: |
          $buildType = 'Release'
          $runTests = 'OFF'
          $enableAsan = 'OFF'
          $artifactSuffix = 'auto'
          $shouldRun = 'true'

          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $buildType = '${{ github.event.inputs.build_type }}'
            $runTests = if ('${{ github.event.inputs.run_tests }}' -eq 'true') { 'ON' } else { 'OFF' }
            $enableAsan = if ('${{ github.event.inputs.sanitizer }}' -eq 'asan') { 'ON' } else { 'OFF' }
            $artifactSuffix = 'manual'
            $selectedPlatform = '${{ github.event.inputs.platform_set }}'

            if ($selectedPlatform -ne 'full' -and $selectedPlatform -ne '${{ matrix.platform_scope }}') {
              $shouldRun = 'false'
            }

            if ($enableAsan -eq 'ON' -and $buildType -eq 'Release') {
              $buildType = 'RelWithDebInfo'
            }
          }

          "build_type=$buildType" >> $env:GITHUB_OUTPUT
          "run_tests=$runTests" >> $env:GITHUB_OUTPUT
          "enable_asan=$enableAsan" >> $env:GITHUB_OUTPUT
          "should_run=$shouldRun" >> $env:GITHUB_OUTPUT
          "artifact_name=ci-$artifactSuffix-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.name }}" >> $env:GITHUB_OUTPUT

      - name: Install Linux system dependencies
        if: runner.os == 'Linux' && steps.ci_options.outputs.should_run == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libx11-xcb-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxcb-cursor-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-render-util0-dev \
            libxcb-shape0-dev \
            libxcb-sync-dev \
            libxcb-xfixes0-dev \
            libxcb-xinerama0-dev \
            libxcb-xkb-dev

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS' && steps.ci_options.outputs.should_run == 'true'
        run: brew install ninja

      - name: Setup MSVC environment
        if: runner.os == 'Windows' && steps.ci_options.outputs.should_run == 'true'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt
        if: steps.ci_options.outputs.should_run == 'true'
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.10.1'
          host: ${{ matrix.qt_host }}
          target: desktop
          arch: ${{ matrix.qt_arch }}
          modules: 'qtserialport qtcharts'
          cache: 'true'

      - name: Configure (Windows)
        if: runner.os == 'Windows' && steps.ci_options.outputs.should_run == 'true'
        run: >
          cmake -S . -B build_ci
          -DCMAKE_BUILD_TYPE=${{ steps.ci_options.outputs.build_type }}
          -DMODBUS_TOOLS_BUILD_TESTS=${{ steps.ci_options.outputs.run_tests }}
          -DMODBUS_TOOLS_ENABLE_ASAN=${{ steps.ci_options.outputs.enable_asan }}

      - name: Configure (POSIX)
        if: runner.os != 'Windows' && steps.ci_options.outputs.should_run == 'true'
        shell: bash
        env:
          CC: ${{ matrix.c_compiler }}
          CXX: ${{ matrix.cxx_compiler }}
        run: |
          cmake -S . -B build_ci -G "${{ matrix.generator }}" \
            -DCMAKE_BUILD_TYPE=${{ steps.ci_options.outputs.build_type }} \
            -DMODBUS_TOOLS_BUILD_TESTS=${{ steps.ci_options.outputs.run_tests }} \
            -DMODBUS_TOOLS_ENABLE_ASAN=${{ steps.ci_options.outputs.enable_asan }}

      - name: Build release bundle (Windows)
        if: runner.os == 'Windows' && steps.ci_options.outputs.should_run == 'true'
        run: >
          cmake --build build_ci
          --target release_bundle
          --config "${{ steps.ci_options.outputs.build_type }}"
          --parallel

      - name: Build release bundle (POSIX)
        if: runner.os != 'Windows' && steps.ci_options.outputs.should_run == 'true'
        shell: bash
        run: |
          cmake --build build_ci --target release_bundle --parallel

      - name: Build tests (Windows)
        if: runner.os == 'Windows' && steps.ci_options.outputs.should_run == 'true' && steps.ci_options.outputs.run_tests == 'ON'
        run: >
          cmake --build build_ci
          --config "${{ steps.ci_options.outputs.build_type }}"
          --parallel

      - name: Build tests (POSIX)
        if: runner.os != 'Windows' && steps.ci_options.outputs.should_run == 'true' && steps.ci_options.outputs.run_tests == 'ON'
        shell: bash
        run: |
          cmake --build build_ci --parallel

      - name: Run tests (Windows)
        if: runner.os == 'Windows' && steps.ci_options.outputs.should_run == 'true' && steps.ci_options.outputs.run_tests == 'ON'
        run: >
          ctest --test-dir build_ci
          -C "${{ steps.ci_options.outputs.build_type }}"
          --output-on-failure

      - name: Run tests (POSIX)
        if: runner.os != 'Windows' && steps.ci_options.outputs.should_run == 'true' && steps.ci_options.outputs.run_tests == 'ON'
        shell: bash
        run: |
          ctest --test-dir build_ci --output-on-failure

      - name: Mark matrix entry skipped
        if: steps.ci_options.outputs.should_run != 'true'
        shell: pwsh
        run: |
          Write-Host "Skipping matrix entry '${{ matrix.name }}' because workflow_dispatch selected platform_set='${{ github.event.inputs.platform_set }}'."

      - name: Upload CI summary artifact
        if: github.event_name == 'workflow_dispatch' && steps.ci_options.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ci_options.outputs.artifact_name }}
          path: |
            build_ci/CMakeCache.txt
            build_ci/CTestTestfile.cmake
          if-no-files-found: ignore
          retention-days: 5
