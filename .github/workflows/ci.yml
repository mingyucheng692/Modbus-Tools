name: CI

on:
  pull_request:
  workflow_dispatch:
    inputs:
      build_type:
        description: Build type
        required: true
        default: Release
        type: choice
        options:
          - Release
          - RelWithDebInfo
      run_tests:
        description: Run unit tests
        required: true
        default: false
        type: boolean
      sanitizer:
        description: Sanitizer profile
        required: true
        default: off
        type: choice
        options:
          - off
          - asan
          - ubsan
      platform_set:
        description: Platform scope
        required: true
        default: full
        type: choice
        options:
          - full
          - windows
          - linux
          - macos

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-matrix:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows MSVC
            os: windows-latest
            platform_scope: windows
            qt_host: windows
            qt_arch: win64_msvc2022_64
            build_config: Release
          - name: Linux GCC
            os: ubuntu-latest
            platform_scope: linux
            qt_host: linux
            qt_arch: linux_gcc_64
            generator: Ninja
            build_config: Release
            c_compiler: gcc
            cxx_compiler: g++
          - name: macOS AppleClang
            os: macos-latest
            platform_scope: macos
            qt_host: mac
            qt_arch: clang_64
            generator: Ninja
            build_config: Release
            c_compiler: clang
            cxx_compiler: clang++

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve CI options
        id: ci_options
        shell: pwsh
        run: |
          $buildType = 'Release'
          $runTests = 'OFF'
          $enableAsan = 'OFF'
          $enableUbsan = 'OFF'
          $artifactSuffix = 'auto'
          $shouldRun = 'true'

          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $buildType = '${{ github.event.inputs.build_type }}'
            $runTests = if ('${{ github.event.inputs.run_tests }}' -eq 'true') { 'ON' } else { 'OFF' }
            $enableAsan = if ('${{ github.event.inputs.sanitizer }}' -eq 'asan') { 'ON' } else { 'OFF' }
            $enableUbsan = if ('${{ github.event.inputs.sanitizer }}' -eq 'ubsan') { 'ON' } else { 'OFF' }
            $artifactSuffix = 'manual'
            $selectedPlatform = '${{ github.event.inputs.platform_set }}'

            if ($selectedPlatform -ne 'full' -and $selectedPlatform -ne '${{ matrix.platform_scope }}') {
              $shouldRun = 'false'
            }

            if (($enableAsan -eq 'ON' -or $enableUbsan -eq 'ON') -and $buildType -eq 'Release') {
              $buildType = 'RelWithDebInfo'
            }
          }

          "build_type=$buildType" >> $env:GITHUB_OUTPUT
          "run_tests=$runTests" >> $env:GITHUB_OUTPUT
          "enable_asan=$enableAsan" >> $env:GITHUB_OUTPUT
          "enable_ubsan=$enableUbsan" >> $env:GITHUB_OUTPUT
          "should_run=$shouldRun" >> $env:GITHUB_OUTPUT
          "artifact_name=ci-$artifactSuffix-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.name }}" >> $env:GITHUB_OUTPUT

      - name: Install Linux system dependencies
        if: runner.os == 'Linux' && steps.ci_options.outputs.should_run == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-tidy \
            ninja-build \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libx11-xcb-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxcb-cursor-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-render-util0-dev \
            libxcb-shape0-dev \
            libxcb-sync-dev \
            libxcb-xfixes0-dev \
            libxcb-xinerama0-dev \
            libxcb-xkb-dev

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS' && steps.ci_options.outputs.should_run == 'true'
        run: brew install ninja

      - name: Setup MSVC environment
        if: runner.os == 'Windows' && steps.ci_options.outputs.should_run == 'true'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt
        if: steps.ci_options.outputs.should_run == 'true'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.3'
          host: ${{ matrix.qt_host }}
          target: desktop
          arch: ${{ matrix.qt_arch }}
          modules: 'qtserialport qtcharts qtscxml'
          cache: 'false'

      - name: Configure (Windows)
        if: runner.os == 'Windows' && steps.ci_options.outputs.should_run == 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build_ci | Out-Null
          & cmake -S . -B build_ci `
            -DCMAKE_BUILD_TYPE=${{ steps.ci_options.outputs.build_type }} `
            -DMODBUS_TOOLS_BUILD_TESTS=${{ steps.ci_options.outputs.run_tests }} `
            -DMODBUS_TOOLS_ENABLE_ASAN=${{ steps.ci_options.outputs.enable_asan }} `
            -DMODBUS_TOOLS_ENABLE_UBSAN=${{ steps.ci_options.outputs.enable_ubsan }} 2>&1 | Tee-Object -FilePath build_ci/configure.log
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Configure (POSIX)
        if: runner.os != 'Windows' && steps.ci_options.outputs.should_run == 'true'
        shell: bash
        env:
          CC: ${{ matrix.c_compiler }}
          CXX: ${{ matrix.cxx_compiler }}
        run: |
          set -o pipefail
          mkdir -p build_ci
          cmake -S . -B build_ci -G "${{ matrix.generator }}" \
            -DCMAKE_BUILD_TYPE=${{ steps.ci_options.outputs.build_type }} \
            -DMODBUS_TOOLS_BUILD_TESTS=${{ steps.ci_options.outputs.run_tests }} \
            -DMODBUS_TOOLS_ENABLE_ASAN=${{ steps.ci_options.outputs.enable_asan }} \
            -DMODBUS_TOOLS_ENABLE_UBSAN=${{ steps.ci_options.outputs.enable_ubsan }} \
            2>&1 | tee build_ci/configure.log

      - name: Validate platform decoupling invariants
        if: steps.ci_options.outputs.should_run == 'true'
        shell: pwsh
        run: |
          $updateMatches = Get-ChildItem core/update -Recurse -Include *.cpp,*.h |
            Select-String -Pattern 'windows\.h|shellapi\.h|ShellExecuteExW'
          if ($updateMatches) {
            Write-Error "Win32 API leakage detected in core/update"
            $updateMatches | ForEach-Object { Write-Host $_ }
            exit 1
          }

          $loggingMatches = Get-ChildItem core/logging -Recurse -Include *.cpp,*.h |
            Select-String -Pattern '_WIN32|Q_OS_WIN'
          if ($loggingMatches) {
            Write-Error "Platform macro leakage detected in core/logging"
            $loggingMatches | ForEach-Object { Write-Host $_ }
            exit 1
          }

          $configureLog = Get-Content build_ci/configure.log -Raw
          if ('${{ runner.os }}' -eq 'Windows') {
            if ($configureLog -notmatch 'Updater target status: enabled \(Windows native target\)') {
              Write-Error "Missing Windows updater enabled status in configure log"
              exit 1
            }
          } else {
            if ($configureLog -notmatch 'Updater target status: disabled on .+; main application builds without updater') {
              Write-Error "Missing non-Windows updater disabled status in configure log"
              exit 1
            }
          }

      - name: Build release bundle (Windows)
        if: runner.os == 'Windows' && steps.ci_options.outputs.should_run == 'true'
        run: >
          cmake --build build_ci
          --target release_bundle
          --config "${{ steps.ci_options.outputs.build_type }}"
          --parallel

      - name: Build release bundle (POSIX)
        if: runner.os != 'Windows' && steps.ci_options.outputs.should_run == 'true'
        shell: bash
        run: |
          cmake --build build_ci --target release_bundle --parallel

      - name: Build updater target (Windows)
        if: runner.os == 'Windows' && steps.ci_options.outputs.should_run == 'true'
        run: >
          cmake --build build_ci
          --target updater
          --config "${{ steps.ci_options.outputs.build_type }}"
          --parallel

      - name: Build tests (Windows)
        if: runner.os == 'Windows' && steps.ci_options.outputs.should_run == 'true' && steps.ci_options.outputs.run_tests == 'ON'
        run: >
          cmake --build build_ci
          --config "${{ steps.ci_options.outputs.build_type }}"
          --parallel

      - name: Build tests (POSIX)
        if: runner.os != 'Windows' && steps.ci_options.outputs.should_run == 'true' && steps.ci_options.outputs.run_tests == 'ON'
        shell: bash
        run: |
          cmake --build build_ci --parallel

      - name: Run tests (Windows)
        if: runner.os == 'Windows' && steps.ci_options.outputs.should_run == 'true' && steps.ci_options.outputs.run_tests == 'ON'
        run: >
          ctest --test-dir build_ci
          -C "${{ steps.ci_options.outputs.build_type }}"
          --output-on-failure

      - name: Run tests (POSIX)
        if: runner.os != 'Windows' && steps.ci_options.outputs.should_run == 'true' && steps.ci_options.outputs.run_tests == 'ON'
        shell: bash
        run: |
          ctest --test-dir build_ci --output-on-failure

      - name: Run clang-tidy (non-blocking, Linux)
        if: runner.os == 'Linux' && steps.ci_options.outputs.should_run == 'true'
        continue-on-error: true
        shell: bash
        env:
          CC: ${{ matrix.c_compiler }}
          CXX: ${{ matrix.cxx_compiler }}
        run: |
          set -o pipefail
          mkdir -p build_tidy
          cmake -S . -B build_tidy -G "${{ matrix.generator }}" \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DMODBUS_TOOLS_BUILD_TESTS=OFF \
            -DMODBUS_TOOLS_ENABLE_CLANG_TIDY=ON \
            2>&1 | tee build_tidy/configure.log
          cmake --build build_tidy --target core --parallel 2>&1 | tee build_tidy/clang-tidy.log

      - name: Build fuzz target (Linux ASan)
        if: runner.os == 'Linux' && steps.ci_options.outputs.should_run == 'true' && steps.ci_options.outputs.run_tests == 'ON' && steps.ci_options.outputs.enable_asan == 'ON'
        shell: bash
        run: |
          cmake --build build_ci --target test_modbus_fuzz --parallel

      - name: Run fuzz target (Linux ASan)
        if: runner.os == 'Linux' && steps.ci_options.outputs.should_run == 'true' && steps.ci_options.outputs.run_tests == 'ON' && steps.ci_options.outputs.enable_asan == 'ON'
        shell: bash
        run: |
          ./build_ci/app/test_modbus_fuzz

      - name: Mark matrix entry skipped
        if: steps.ci_options.outputs.should_run != 'true'
        shell: pwsh
        run: |
          Write-Host "Skipping matrix entry '${{ matrix.name }}' because workflow_dispatch selected platform_set='${{ github.event.inputs.platform_set }}'."

      - name: Upload CI summary artifact
        if: github.event_name == 'workflow_dispatch' && steps.ci_options.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ci_options.outputs.artifact_name }}
          path: |
            build_ci/configure.log
            build_ci/CMakeCache.txt
            build_ci/CTestTestfile.cmake
            build_tidy/configure.log
            build_tidy/clang-tidy.log
          if-no-files-found: ignore
          retention-days: 5
